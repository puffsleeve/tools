<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff1a2e;
    --red-dim: #cc0016;
    --red-glow: rgba(255,26,46,0.4);
    --teal: #00e5cc;
    --teal-glow: rgba(0,229,204,0.3);
    --orange: #ff7700;
    --dark: #0a0508;
    --dark2: #120a0c;
    --dark3: #1a0d10;
    --card-bg: rgba(20,8,10,0.85);
    --text: #f0d0d4;
    --text-dim: #a07880;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--dark);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  .scanline {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    pointer-events: none; z-index: 50;
  }
  .noise {
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 49; opacity: 0.5;
  }
  .bg-blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
  .bg-blob-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,26,46,0.18) 0%, transparent 70%); top: -100px; left: -100px; animation: blobMove1 8s ease-in-out infinite alternate; }
  .bg-blob-2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,229,204,0.12) 0%, transparent 70%); bottom: 100px; right: -50px; animation: blobMove2 10s ease-in-out infinite alternate; }
  .bg-blob-3 { width: 250px; height: 250px; background: radial-gradient(circle, rgba(255,119,0,0.1) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); animation: blobMove3 12s ease-in-out infinite alternate; }
  @keyframes blobMove1 { to { transform: translate(40px, 60px); } }
  @keyframes blobMove2 { to { transform: translate(-30px, -40px); } }
  @keyframes blobMove3 { to { transform: translate(-50px, 30px); } }

  .grid-bg {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,26,46,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,26,46,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative;
    z-index: 55;
    max-width: 520px;
    margin: 0 auto;
    padding: 40px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .back-link {
    align-self: flex-start;
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-decoration: none;
    margin-bottom: 24px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--red); }

  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 36px;
    animation: fadeInDown 0.8s ease both;
  }

  .name {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 900;
    font-size: 2rem;
    letter-spacing: 0.05em;
    color: #fff;
    text-shadow: 0 0 20px var(--red-glow), 0 0 40px rgba(255,26,46,0.2);
    margin-bottom: 4px;
    text-align: center;
  }
  .name .dot { color: var(--red); }

  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
  .tag {
    font-size: 0.65rem;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border: 1px solid;
    text-transform: uppercase;
  }
  .tag-teal { color: var(--teal); border-color: var(--teal); background: rgba(0,229,204,0.06); }

  .bio {
    font-size: 0.8rem;
    line-height: 1.7;
    color: var(--text-dim);
    text-align: center;
    max-width: 340px;
    letter-spacing: 0.03em;
  }

  .divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    animation: fadeIn 1s ease 0.4s both;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--red-dim), transparent); }
  .divider-icon {
    font-size: 0.65rem; font-family: 'Orbitron', monospace; color: var(--red-dim);
    letter-spacing: 0.2em; white-space: nowrap;
  }

  .links { width: 100%; display: flex; flex-direction: column; gap: 12px; }

  .link-item {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 18px;
    background: var(--card-bg);
    border: 1px solid rgba(255,26,46,0.15);
    text-decoration: none;
    color: var(--text);
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
    animation: slideInUp 0.6s ease both;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  }
  .link-item:nth-child(1) { animation-delay: 0.1s; }
  .link-item:nth-child(2) { animation-delay: 0.2s; }
  .link-item:nth-child(3) { animation-delay: 0.3s; }

  .link-item::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }
  .link-item::after {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--link-color, var(--red));
    transform: scaleY(0);
    transition: transform 0.3s ease;
    transform-origin: center;
  }
  .link-item:hover {
    border-color: var(--link-color, var(--red));
    transform: translateX(4px);
    box-shadow: 0 0 20px rgba(255,26,46,0.1), inset 0 0 30px rgba(255,26,46,0.03);
  }
  .link-item:hover::before { transform: translateX(100%); }
  .link-item:hover::after { transform: scaleY(1); }

  .link-icon {
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 1.1rem;
    background: rgba(255,26,46,0.08);
    border: 1px solid rgba(255,26,46,0.2);
    color: var(--link-color, var(--red));
    clip-path: polygon(10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .link-item:hover .link-icon { background: rgba(255,26,46,0.15); box-shadow: 0 0 15px var(--red-glow); }

  .link-info { flex: 1; min-width: 0; }
  .link-platform {
    font-family: 'Orbitron', monospace; font-size: 0.6rem; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--link-color, var(--red));
    margin-bottom: 2px; opacity: 0.8;
  }
  .link-label { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.03em; color: #fff; }
  .link-desc { font-size: 0.72rem; color: var(--text-dim); margin-top: 3px; line-height: 1.5; }

  .link-arrow {
    font-size: 0.75rem; color: var(--text-dim); flex-shrink: 0;
    transition: transform 0.3s, color 0.3s; font-family: 'Orbitron', monospace;
  }
  .link-item:hover .link-arrow { transform: translateX(4px); color: var(--link-color, var(--red)); }

  .c-shorts { --link-color: var(--teal); }

  .footer { margin-top: 40px; text-align: center; animation: fadeIn 1.2s ease 1s both; }
  .footer-tag { font-family: 'Orbitron', monospace; font-size: 0.55rem; letter-spacing: 0.2em; color: var(--red-dim); text-transform: uppercase; opacity: 0.6; }
  .copylight { margin-top: 6px; font-family: 'Orbitron', monospace; font-size: 0.55rem; letter-spacing: 0.15em; color: var(--text-dim); opacity: 0.5; }

  .corner-deco { position: fixed; z-index: 200; pointer-events: none; }
  .corner-deco svg { display: block; }
  .corner-tl { top: 0; left: 0; }
  .corner-tr { top: 0; right: 0; transform: scaleX(-1); }
  .corner-bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .corner-br { bottom: 0; right: 0; transform: scale(-1); }

  @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--red-dim); }

  @media (max-width: 400px) {
    .name { font-size: 1.7rem; }
    .container { padding: 30px 16px 50px; }
  }
</style>
</head>
