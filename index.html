<style>
  :root {
    --red: #ff1a2e;
    --red-dim: #cc0016;
    --red-glow: rgba(255,26,46,0.4);
    --teal: #00e5cc;
    --teal-glow: rgba(0,229,204,0.3);
    --orange: #ff7700;
    --dark: #0a0508;
    --dark2: #120a0c;
    --dark3: #1a0d10;
    --card-bg: rgba(20,8,10,0.85);
    --text: #f0d0d4;
    --text-dim: #a07880;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--dark);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Scanline overlay */
  .scanline {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 50;
  }

  /* Noise texture */
  .noise {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 49;
    opacity: 0.5;
  }

  /* Background glow blobs */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .bg-blob-1 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255,26,46,0.18) 0%, transparent 70%);
    top: -100px; left: -100px;
    animation: blobMove1 8s ease-in-out infinite alternate;
  }
  .bg-blob-2 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(0,229,204,0.12) 0%, transparent 70%);
    bottom: 100px; right: -50px;
    animation: blobMove2 10s ease-in-out infinite alternate;
  }
  .bg-blob-3 {
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(255,119,0,0.1) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: blobMove3 12s ease-in-out infinite alternate;
  }
  @keyframes blobMove1 { to { transform: translate(40px, 60px); } }
  @keyframes blobMove2 { to { transform: translate(-30px, -40px); } }
  @keyframes blobMove3 { to { transform: translate(-50px, 30px); } }

  /* Grid lines background */
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,26,46,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,26,46,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 55;
    max-width: 520px;
    margin: 0 auto;
    padding: 40px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Profile section */
  .profile {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 36px;
    animation: fadeInDown 0.8s ease both;
  }

  .avatar-wrap {
    position: relative;
    width: 130px;
    height: 130px;
    margin-bottom: 18px;
  }

  .avatar-wrap::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(rgba(255,26,46,0.55), rgba(0,229,204,0.35), rgba(255,119,0,0.45), rgba(255,26,46,0.55));
    animation: spinBorder 7s linear infinite;
    z-index: 0;
  }

  .avatar-wrap::after {
    content: '';
    position: absolute;
    inset: -7px;
    border-radius: 50%;
    background: conic-gradient(rgba(255,26,46,0.08), transparent, rgba(0,229,204,0.08), transparent);
    animation: spinBorder 12s linear infinite reverse;
    filter: blur(8px);
    z-index: 0;
  }

  @keyframes spinBorder {
    to { transform: rotate(360deg); }
  }

  .avatar {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    border: 3px solid var(--dark);
    display: block;
    position: relative;
    z-index: 55;
  }

  .avatar-wrap {
    position: relative;
    z-index: 55;
  }

  /* Pixel decoration */
  .pixel-deco {
    position: absolute;
    width: 8px;
    height: 8px;
    background: var(--teal);
    animation: pixelBlink 1.5s steps(1) infinite;
  }
  .pixel-deco:nth-child(2) { top: 5px; right: 5px; animation-delay: 0.3s; background: var(--red); }
  .pixel-deco:nth-child(3) { bottom: 8px; left: 2px; animation-delay: 0.7s; background: var(--orange); width: 6px; height: 6px; }
  @keyframes pixelBlink { 50% { opacity: 0; } }

  .name {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 900;
    font-size: 2rem;
    letter-spacing: 0.05em;
    color: #fff;
    text-shadow:
      0 0 20px var(--red-glow),
      0 0 40px rgba(255,26,46,0.2);
    margin-bottom: 4px;
  }

  .name .dot {
    color: var(--red);
  }

  .tag-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 12px;
  }

  .tag {
    font-size: 0.65rem;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border: 1px solid;
    text-transform: uppercase;
    animation: tagGlow 3s ease-in-out infinite alternate;
  }

  .tag-red { color: var(--red); border-color: var(--red); background: rgba(255,26,46,0.08); }
  .tag-teal { color: var(--teal); border-color: var(--teal); background: rgba(0,229,204,0.06); animation-delay: 1s; }
  .tag-orange { color: var(--orange); border-color: var(--orange); background: rgba(255,119,0,0.06); animation-delay: 2s; }

  @keyframes tagGlow {
    to { box-shadow: 0 0 10px currentColor; }
  }

  .bio {
    font-size: 0.8rem;
    line-height: 1.7;
    color: var(--text-dim);
    text-align: center;
    max-width: 320px;
    letter-spacing: 0.03em;
  }

  .bio strong {
    color: var(--red);
    font-weight: 700;
  }

  /* Divider */
  .divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    animation: fadeIn 1s ease 0.4s both;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--red-dim), transparent);
  }

  .divider-icon {
    font-size: 0.65rem;
    font-family: 'Orbitron', monospace;
    color: var(--red-dim);
    letter-spacing: 0.2em;
    white-space: nowrap;
  }

  /* Links */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    background: var(--card-bg);
    border: 1px solid rgba(255,26,46,0.15);
    text-decoration: none;
    color: var(--text);
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
    animation: slideInUp 0.6s ease both;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  }

  .link-item:nth-child(1) { animation-delay: 0.1s; }
  .link-item:nth-child(2) { animation-delay: 0.2s; }
  .link-item:nth-child(3) { animation-delay: 0.3s; }
  .link-item:nth-child(4) { animation-delay: 0.4s; }
  .link-item:nth-child(5) { animation-delay: 0.5s; }
  .link-item:nth-child(6) { animation-delay: 0.6s; }
  .link-item:nth-child(7) { animation-delay: 0.7s; }

  /* Hover shimmer */
  .link-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }

  /* Left accent bar */
  .link-item::after {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--link-color, var(--red));
    transform: scaleY(0);
    transition: transform 0.3s ease;
    transform-origin: center;
  }

  .link-item:hover {
    border-color: var(--link-color, var(--red));
    transform: translateX(4px);
    box-shadow: 0 0 20px rgba(255,26,46,0.1), inset 0 0 30px rgba(255,26,46,0.03);
  }

  .link-item:hover::before { transform: translateX(100%); }
  .link-item:hover::after { transform: scaleY(1); }

  .link-icon {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 1.1rem;
    background: rgba(255,26,46,0.08);
    border: 1px solid rgba(255,26,46,0.2);
    color: var(--link-color, var(--red));
    clip-path: polygon(10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%);
    transition: background 0.3s, box-shadow 0.3s;
  }

  .link-item:hover .link-icon {
    background: rgba(255,26,46,0.15);
    box-shadow: 0 0 15px var(--red-glow);
  }

  .link-info {
    flex: 1;
    min-width: 0;
  }

  .link-platform {
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--link-color, var(--red));
    margin-bottom: 2px;
    opacity: 0.8;
  }

  .link-label {
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .link-arrow {
    font-size: 0.75rem;
    color: var(--text-dim);
    flex-shrink: 0;
    transition: transform 0.3s, color 0.3s;
    font-family: 'Orbitron', monospace;
  }

  .link-item:hover .link-arrow {
    transform: translateX(4px);
    color: var(--link-color, var(--red));
  }

  /* Color variants */
  .c-twitter { --link-color: #1d9bf0; }
  .c-youtube { --link-color: #ff0033; }
  .c-twitch { --link-color: #9147ff; }
  .c-reality { --link-color: var(--teal); }
  .c-instagram { --link-color: #e1306c; }
  .c-suzuri { --link-color: var(--orange); }
  .c-booth { --link-color: #fc4b6c; }

  /* Footer */
  .footer {
    margin-top: 40px;
    text-align: center;
    animation: fadeIn 1.2s ease 1s both;
  }

  .footer-tag {
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--red-dim);
    text-transform: uppercase;
    opacity: 0.6;
  }

  .hashtag {
    display: inline-block;
    margin-top: 8px;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--teal);
    letter-spacing: 0.05em;
    text-shadow: 0 0 10px var(--teal-glow);
  }

  .copylight {
    margin-top: 6px;
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    opacity: 0.5;
  }

  /* Pixel corner decorations */
  .corner-deco {
    position: fixed;
    z-index: 200;
    pointer-events: none;
  }
  .corner-deco svg { display: block; }
  .corner-tl { top: 0; left: 0; }
  .corner-tr { top: 0; right: 0; transform: scaleX(-1); }
  .corner-bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .corner-br { bottom: 0; right: 0; transform: scale(-1); }

  /* Animations */
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Glitch text effect on hover */
  .name:hover {
    animation: glitch 0.4s steps(2) both;
  }
  @keyframes glitch {
    0% { text-shadow: 0 0 20px var(--red-glow); }
    25% { text-shadow: -3px 0 var(--teal), 3px 0 var(--red); }
    50% { text-shadow: 3px 0 var(--orange), -3px 0 var(--red); }
    75% { text-shadow: -2px 0 var(--teal), 2px 0 var(--orange); }
    100% { text-shadow: 0 0 20px var(--red-glow); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--red-dim); }

  @media (max-width: 400px) {
    .name { font-size: 1.7rem; }
    .container { padding: 30px 16px 50px; }
  }
</style>
</head>
